# Orchestrator project registry
#
# path_local INVARIANT (default): must point at the root of the 1C XML dump
# (Configuration.xml + Catalogs/). Set skip_path_invariant: true for extension
# repos like PFS where sources live in the git root without a full dump layout.
#
# MCP wiring — choose one:
#   A) codemeta_port + vm_docker_host → templates/*-mcp.json.tpl (docker codemetadata)
#   B) mcp_config_file → static JSON copied into each task (local MCP stack)

vm_docker_host: localhost

projects:

  # PFS — расширение + локальный стек 1C MCP (см. PFS/.cursor/mcp.json)
  pfs:
    path_local: C:/Tools/DevsProject/ai/PFS
    skip_path_invariant: true
    allow_missing_git_remote: true
    mcp_config_file: config/pfs-mcp.json
    mcp_servers:
      - 1c-code-metadata-mcp
      - 1c-syntax-checker-mcp
      - 1C-docs-mcp
      - 1c-templates-mcp
      - 1c-graph-metadata-mcp
      - 1c-code-check-mcp
      - 1c-ssl-mcp
      - 1c-data-mcp

  # Example A: split-mirror project (read-only codemetadata XML dump +
  # separate writable git workspace where the implementer commits).
  example-trade:
    path_local: <workspace>/1c-projects/example-trade/src
    extra_writable_dir: <workspace>/1c-exchange/example-trade
    codemeta_port: 7630
    mcp_servers: [codemetadata]

  # Example B: simple project (path_local doubles as git target).
  example-mfg:
    path_local: <workspace>/1c-projects/example-mfg/src
    codemeta_port: 7610
    mcp_servers: [codemetadata]
